<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightscapes – Neon Energy Generator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: radial-gradient(circle at center, #120018 0%, #05010a 60%, #000000 100%);
      font-family: Arial, sans-serif;
      color: white;
    }

    canvas {
      display: block;
    }

    .overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      max-width: 420px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 0 30px rgba(255, 0, 200, 0.15);
    }

    .overlay h1 {
      font-size: 1.8rem;
      margin-bottom: 10px;
      color: #ff7af6;
      text-shadow: 0 0 10px rgba(255, 122, 246, 0.7);
    }

    .overlay p {
      font-size: 0.98rem;
      line-height: 1.5;
      color: rgba(255,255,255,0.88);
    }

    .signature {
      margin-top: 14px;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Lightscapes</h1>
    <p>
      Move through the darkness and create glowing energy trails.
      A small interactive neon artwork inspired by healing, intuition and light.
    </p>
    <div class="signature">Interactive visual concept</div>
  </div>

  <canvas id="art"></canvas>

  <script>
    const canvas = document.getElementById("art");
    const ctx = canvas.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    let particles = [];
    let hue = 280;

    window.addEventListener("resize", () => {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    });

    class Particle {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.size = Math.random() * 6 + 2;
        this.speedX = (Math.random() - 0.5) * 2;
        this.speedY = (Math.random() - 0.5) * 2;
        this.life = 100;
        this.color = `hsla(${hue + Math.random() * 80}, 100%, 65%, 0.9)`;
      }

      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        this.life -= 2;
        this.size *= 0.98;
      }

      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 20;
        ctx.shadowColor = this.color;
        ctx.fill();
      }
    }

    function addParticles(x, y) {
      for (let i = 0; i < 4; i++) {
        particles.push(new Particle(x, y));
      }
    }

    window.addEventListener("mousemove", (e) => {
      addParticles(e.x, e.y);
      hue += 0.5;
    });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      addParticles(touch.clientX, touch.clientY);
      hue += 0.8;
    }, { passive: false });

    function animate() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
      ctx.fillRect(0, 0, w, h);

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();

        if (particles[i].life <= 0 || particles[i].size < 0.3) {
          particles.splice(i, 1);
        }
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
