<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightscapes – Neon Energy Generator</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 0, 180, 0.25) 0%, transparent 38%),
        radial-gradient(circle at 75% 25%, rgba(0, 220, 255, 0.12) 0%, transparent 28%),
        radial-gradient(circle at 20% 75%, rgba(255, 180, 0, 0.10) 0%, transparent 24%),
        #000;
    }

    canvas {
      display: block;
    }

    #art {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    #radar {
      position: absolute;
      top: 26px;
      right: 26px;
      width: 270px;
      height: 270px;
      z-index: 5;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 22px;
      backdrop-filter: blur(8px);
      box-shadow:
        0 0 30px rgba(0, 255, 255, 0.10),
        0 0 45px rgba(180, 0, 255, 0.08);
    }

    .overlay {
      position: absolute;
      top: 26px;
      left: 26px;
      z-index: 6;
      max-width: 430px;
      padding: 20px 22px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 35px rgba(180, 0, 255, 0.12);
    }

    .overlay h1 {
      font-size: 1.9rem;
      color: #f2d8ff;
      margin-bottom: 10px;
      text-shadow: 0 0 18px rgba(255, 120, 255, 0.35);
    }

    .overlay p {
      color: rgba(255, 255, 255, 0.84);
      line-height: 1.55;
      font-size: 0.98rem;
    }

    .signature {
      margin-top: 12px;
      color: rgba(255, 255, 255, 0.55);
      font-size: 0.83rem;
      letter-spacing: 0.04em;
    }

    .hint {
      position: absolute;
      left: 26px;
      bottom: 26px;
      z-index: 6;
      padding: 12px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.72);
      font-size: 0.9rem;
      backdrop-filter: blur(8px);
    }

    @media (max-width: 900px) {
      #radar {
        top: auto;
        right: 16px;
        bottom: 16px;
        width: 220px;
        height: 220px;
      }

      .overlay {
        top: 16px;
        left: 16px;
        right: 16px;
        max-width: none;
      }

      .hint {
        left: 16px;
        bottom: 16px;
        max-width: 52%;
      }
    }

    @media (max-width: 640px) {
      #radar {
        display: none;
      }

      .hint {
        right: 16px;
        max-width: none;
      }

      .overlay h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Lightscapes</h1>
    <p>
      A digital space where light, movement and energy become visible.
      Move your mouse and create glowing geometric fields, flowing neon lines
      and layered visual structures.
    </p>
    <div class="signature">Interactive visual artwork</div>
  </div>

  <div class="hint">Move slowly for longer glowing structures ✧</div>

  <canvas id="art"></canvas>
  <canvas id="radar"></canvas>

  <script>
    const canvas = document.getElementById("art");
    const ctx = canvas.getContext("2d");

    const radar = document.getElementById("radar");
    const rctx = radar.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    let points = [];
    let hue = 260;

    const radarLabels = ["Art", "Energy", "Flow", "Emotion"];
    const radarValues = [0.92, 0.78, 0.84, 0.68];

    function resizeAll() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;

      const radarRect = radar.getBoundingClientRect();
      radar.width = Math.max(220, Math.floor(radarRect.width));
      radar.height = Math.max(220, Math.floor(radarRect.height));
    }

    resizeAll();
    window.addEventListener("resize", resizeAll);

    class Point {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 1.8;
        this.vy = (Math.random() - 0.5) * 1.8;
        this.life = 240;
        this.hue = hue + Math.random() * 90;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.994;
        this.vy *= 0.994;
        this.life -= 1;
      }
    }

    function addPoints(x, y) {
      for (let i = 0; i < 7; i++) {
        points.push(new Point(x, y));
      }
    }

    window.addEventListener("mousemove", (e) => {
      addPoints(e.clientX, e.clientY);
      hue += 0.8;
      if (hue > 360) hue = 220;
    });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      addPoints(touch.clientX, touch.clientY);
      hue += 0.8;
      if (hue > 360) hue = 220;
    }, { passive: false });

    window.addEventListener("click", (e) => {
      for (let i = 0; i < 24; i++) {
        points.push(new Point(e.clientX, e.clientY));
      }
    });

    function drawConnections() {
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = points[i].x - points[j].x;
          const dy = points[i].y - points[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 170) {
            const alpha = (1 - dist / 170) * 0.22;
            const color = `hsla(${(points[i].hue + points[j].hue) / 2}, 100%, 65%, ${alpha})`;

            ctx.beginPath();
            ctx.moveTo(points[i].x, points[i].y);
            ctx.lineTo(points[j].x, points[j].y);
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.3;
            ctx.shadowBlur = 26;
            ctx.shadowColor = color;
            ctx.stroke();
          }
        }
      }
    }

    function drawTriangles() {
      for (let i = 0; i < points.length - 2; i++) {
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2];

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.closePath();

        const color = `hsla(${p1.hue}, 100%, 65%, 0.05)`;
        ctx.fillStyle = color;
        ctx.shadowBlur = 40;
        ctx.shadowColor = color;
        ctx.fill();
      }
    }

    function drawRadar() {
      const rw = radar.width;
      const rh = radar.height;
      const cx = rw / 2;
      const cy = rh / 2;
      const radius = Math.min(rw, rh) * 0.30;

      rctx.clearRect(0, 0, rw, rh);

      for (let level = 1; level <= 4; level++) {
        const r = radius * (level / 4);

        rctx.beginPath();
        radarLabels.forEach((_, i) => {
          const angle = (Math.PI * 2 / radarLabels.length) * i - Math.PI / 2;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          if (i === 0) rctx.moveTo(x, y);
          else rctx.lineTo(x, y);
        });
        rctx.closePath();
        rctx.strokeStyle = "rgba(130, 255, 230, 0.14)";
        rctx.lineWidth = 1;
        rctx.stroke();
      }

      radarLabels.forEach((label, i) => {
        const angle = (Math.PI * 2 / radarLabels.length) * i - Math.PI / 2;
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;

        rctx.beginPath();
        rctx.moveTo(cx, cy);
        rctx.lineTo(x, y);
        rctx.strokeStyle = "rgba(130, 255, 230, 0.22)";
        rctx.lineWidth = 1;
        rctx.stroke();

        const lx = cx + Math.cos(angle) * (radius + 26);
        const ly = cy + Math.sin(angle) * (radius + 26);

        rctx.fillStyle = "rgba(255,255,255,0.82)";
        rctx.font = "13px Arial";
        rctx.textAlign = "center";
        rctx.fillText(label, lx, ly);
      });

      rctx.beginPath();
      radarValues.forEach((val, i) => {
        const angle = (Math.PI * 2 / radarValues.length) * i - Math.PI / 2;
        const x = cx + Math.cos(angle) * radius * val;
        const y = cy + Math.sin(angle) * radius * val;
        if (i === 0) rctx.moveTo(x, y);
        else rctx.lineTo(x, y);
      });
      rctx.closePath();

      rctx.fillStyle = "rgba(80, 255, 200, 0.18)";
      rctx.shadowBlur = 24;
      rctx.shadowColor = "#58ffe7";
      rctx.fill();

      rctx.strokeStyle = "#58ffe7";
      rctx.lineWidth = 2;
      rctx.stroke();

      radarValues.forEach((val, i) => {
        const angle = (Math.PI * 2 / radarValues.length) * i - Math.PI / 2;
        const x = cx + Math.cos(angle) * radius * val;
        const y = cy + Math.sin(angle) * radius * val;

        rctx.beginPath();
        rctx.arc(x, y, 4, 0, Math.PI * 2);
        rctx.fillStyle = "#bafff3";
        rctx.shadowBlur = 18;
        rctx.shadowColor = "#58ffe7";
        rctx.fill();
      });
    }

    function animate() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.025)";
      ctx.fillRect(0, 0, w, h);

      for (let i = points.length - 1; i >= 0; i--) {
        points[i].update();
        if (points[i].life <= 0) {
          points.splice(i, 1);
        }
      }

      drawConnections();
      drawTriangles();
      drawRadar();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
