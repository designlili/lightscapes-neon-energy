<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightscapes – Neon Energy Generator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
      background:
        radial-gradient(circle at center, rgba(120, 0, 180, 0.22) 0%, transparent 40%),
        radial-gradient(circle at 75% 25%, rgba(0, 220, 255, 0.10) 0%, transparent 30%),
        radial-gradient(circle at 20% 75%, rgba(255, 180, 0, 0.08) 0%, transparent 24%),
        #000;
    }

    #art {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 1;
    }

    #radar {
      position: absolute;
      top: 24px;
      right: 24px;
      width: 240px;
      height: 240px;
      z-index: 5;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      backdrop-filter: blur(8px);
    }

    .overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 6;
      max-width: 420px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 30px rgba(180,0,255,0.12);
    }

    .overlay h1 {
      color: #f3d8ff;
      margin-bottom: 10px;
      font-size: 1.8rem;
      text-shadow: 0 0 18px rgba(255, 100, 255, 0.35);
    }

    .overlay p {
      color: rgba(255,255,255,0.84);
      line-height: 1.5;
    }

    @media (max-width: 700px) {
      #radar { display: none; }
      .overlay {
        top: 16px;
        left: 16px;
        right: 16px;
        max-width: none;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>Lightscapes</h1>
    <p>Move your mouse and create glowing neon structures and flowing energy.</p>
  </div>

  <canvas id="art"></canvas>
  <canvas id="radar"></canvas>

  <script>
    const canvas = document.getElementById("art");
    const ctx = canvas.getContext("2d");

    const radar = document.getElementById("radar");
    const rctx = radar.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    let points = [];
    let hue = 260;

    function resizeAll() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      radar.width = 240;
      radar.height = 240;
    }

    resizeAll();
    window.addEventListener("resize", resizeAll);

    class Point {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.vx = (Math.random() - 0.5) * 1.8;
        this.vy = (Math.random() - 0.5) * 1.8;
        this.life = 220;
        this.hue = hue + Math.random() * 90;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vx *= 0.994;
        this.vy *= 0.994;
        this.life -= 1;
      }
    }

    function addPoints(x, y) {
      for (let i = 0; i < 7; i++) {
        points.push(new Point(x, y));
      }
    }

    window.addEventListener("mousemove", (e) => {
      addPoints(e.clientX, e.clientY);
      hue += 0.8;
      if (hue > 360) hue = 220;
    });

    window.addEventListener("touchmove", (e) => {
      e.preventDefault();
      const touch = e.touches[0];
      addPoints(touch.clientX, touch.clientY);
      hue += 0.8;
      if (hue > 360) hue = 220;
    }, { passive: false });

    function drawConnections() {
      for (let i = 0; i < points.length; i++) {
        for (let j = i + 1; j < points.length; j++) {
          const dx = points[i].x - points[j].x;
          const dy = points[i].y - points[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          if (dist < 170) {
            const alpha = (1 - dist / 170) * 0.22;
            const color = `hsla(${(points[i].hue + points[j].hue) / 2}, 100%, 65%, ${alpha})`;

            ctx.beginPath();
            ctx.moveTo(points[i].x, points[i].y);
            ctx.lineTo(points[j].x, points[j].y);
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.3;
            ctx.shadowBlur = 26;
            ctx.shadowColor = color;
            ctx.stroke();
          }
        }
      }
    }

    function drawTriangles() {
      for (let i = 0; i < points.length - 2; i++) {
        const p1 = points[i];
        const p2 = points[i + 1];
        const p3 = points[i + 2];

        ctx.beginPath();
        ctx.moveTo(p1.x, p1.y);
        ctx.lineTo(p2.x, p2.y);
        ctx.lineTo(p3.x, p3.y);
        ctx.closePath();

        const color = `hsla(${p1.hue}, 100%, 65%, 0.05)`;
        ctx.fillStyle = color;
        ctx.shadowBlur = 38;
        ctx.shadowColor = color;
        ctx.fill();
      }
    }

    function drawRadar() {
      rctx.clearRect(0, 0, radar.width, radar.height);

      const cx = radar.width / 2;
      const cy = radar.height / 2;
      const radius = 70;
      const labels = ["Art", "Energy", "Flow", "Emotion"];
      const values = [0.92, 0.78, 0.84, 0.68];

      for (let level = 1; level <= 4; level++) {
        const r = radius * (level / 4);
        rctx.beginPath();
        labels.forEach((_, i) => {
          const angle = (Math.PI * 2 / labels.length) * i - Math.PI / 2;
          const x = cx + Math.cos(angle) * r;
          const y = cy + Math.sin(angle) * r;
          if (i === 0) rctx.moveTo(x, y);
          else rctx.lineTo(x, y);
        });
        rctx.closePath();
        rctx.strokeStyle = "rgba(130,255,230,0.14)";
        rctx.stroke();
      }

      labels.forEach((label, i) => {
        const angle = (Math.PI * 2 / labels.length) * i - Math.PI / 2;
        const x = cx + Math.cos(angle) * radius;
        const y = cy + Math.sin(angle) * radius;

        rctx.beginPath();
        rctx.moveTo(cx, cy);
        rctx.lineTo(x, y);
        rctx.strokeStyle = "rgba(130,255,230,0.2)";
        rctx.stroke();

        rctx.fillStyle = "rgba(255,255,255,0.8)";
        rctx.font = "12px Arial";
        rctx.textAlign = "center";
        rctx.fillText(label, cx + Math.cos(angle) * (radius + 20), cy + Math.sin(angle) * (radius + 20));
      });

      rctx.beginPath();
      values.forEach((val, i) => {
        const angle = (Math.PI * 2 / values.length) * i - Math.PI / 2;
        const x = cx + Math.cos(angle) * radius * val;
        const y = cy + Math.sin(angle) * radius * val;
        if (i === 0) rctx.moveTo(x, y);
        else rctx.lineTo(x, y);
      });
      rctx.closePath();

      rctx.fillStyle = "rgba(88,255,231,0.16)";
      rctx.shadowBlur = 20;
      rctx.shadowColor = "#58ffe7";
      rctx.fill();

      rctx.strokeStyle = "#58ffe7";
      rctx.lineWidth = 2;
      rctx.stroke();
    }

    function animate() {
      ctx.fillStyle = "rgba(0, 0, 0, 0.025)";
      ctx.fillRect(0, 0, w, h);

      for (let i = points.length - 1; i >= 0; i--) {
        points[i].update();
        if (points[i].life <= 0) {
          points.splice(i, 1);
        }
      }

      drawConnections();
      drawTriangles();
      drawRadar();

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
