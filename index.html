<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lightscapes – Energy Geometry</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      font-family: Arial, sans-serif;
    }

    body {
      background:
        radial-gradient(circle at center, rgba(120, 0, 180, 0.35) 0%, transparent 45%),
        radial-gradient(circle at 70% 30%, rgba(0, 200, 255, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 30% 70%, rgba(255, 200, 0, 0.18) 0%, transparent 35%),
        #000;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      max-width: 420px;
      padding: 20px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 40px rgba(180,0,255,0.15);
    }

    .overlay h1 {
      font-size: 1.8rem;
      color: #f5d7ff;
      text-shadow: 0 0 25px rgba(255,100,255,0.5);
    }

    .overlay p {
      margin-top: 10px;
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
    }

    .signature {
      margin-top: 12px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }
  </style>
</head>
<body>

<div class="overlay">
  <h1>Lightscapes</h1>
  <p>
    A space where light becomes structure,  
    and movement reveals hidden energy.
  </p>
  <div class="signature">Interactive Light Art</div>
</div>

<canvas id="art"></canvas>

<script>
const canvas = document.getElementById("art");
const ctx = canvas.getContext("2d");

let w = canvas.width = window.innerWidth;
let h = canvas.height = window.innerHeight;

let points = [];
let hue = 260;

window.addEventListener("resize", () => {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
});

class Point {
  constructor(x, y) {
    this.x = x;
    this.y = y;

    this.vx = (Math.random() - 0.5) * 1.5;
    this.vy = (Math.random() - 0.5) * 1.5;

    this.life = 280;
    this.hue = hue + Math.random() * 80;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;

    this.vx *= 0.992;
    this.vy *= 0.992;

    this.life -= 1;
  }
}

function addPoints(x, y) {
  for (let i = 0; i < 8; i++) {
    points.push(new Point(x, y));
  }
}

window.addEventListener("mousemove", (e) => {
  addPoints(e.x, e.y);
  hue += 0.6;
});

function drawConnections() {
  for (let i = 0; i < points.length; i++) {
    for (let j = i + 1; j < points.length; j++) {

      const dx = points[i].x - points[j].x;
      const dy = points[i].y - points[j].y;
      const dist = Math.sqrt(dx*dx + dy*dy);

      if (dist < 180) {

        const alpha = (1 - dist / 180) * 0.25;

        const color = `hsla(${(points[i].hue + points[j].hue)/2}, 100%, 65%, ${alpha})`;

        ctx.beginPath();
        ctx.moveTo(points[i].x, points[i].y);
        ctx.lineTo(points[j].x, points[j].y);

        ctx.strokeStyle = color;
        ctx.lineWidth = 1.4;
        ctx.shadowBlur = 40;
        ctx.shadowColor = color;

        ctx.stroke();
      }
    }
  }
}

function drawTriangles() {
  for (let i = 0; i < points.length - 2; i++) {

    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2];

    const color = `hsla(${p1.hue}, 100%, 65%, 0.07)`;

    ctx.beginPath();
    ctx.moveTo(p1.x, p1.y);
    ctx.lineTo(p2.x, p2.y);
    ctx.lineTo(p3.x, p3.y);
    ctx.closePath();

    ctx.fillStyle = color;
    ctx.shadowBlur = 60;
    ctx.shadowColor = color;
    ctx.fill();
  }
}

function animate() {
  ctx.fillStyle = "rgba(0,0,0,0.02)";
  ctx.fillRect(0, 0, w, h);

  for (let i = points.length - 1; i >= 0; i--) {
    points[i].update();
    if (points[i].life <= 0) {
      points.splice(i, 1);
    }
  }

  drawConnections();
  drawTriangles();

  requestAnimationFrame(animate);
}

animate();

<canvas id="chart" style="
  position:absolute;
  bottom:30px;
  left:30px;
  width:300px;
  height:200px;
  z-index:20;
"></canvas>

 <script>
   ...dein kompletter Neon-Code...

   animate();

   // 🔥 Glow Chart
   const chart = document.getElementById("chart");
   const cctx = chart.getContext("2d");

   chart.width = 300;
   chart.height = 200;

   const data = [80, 50, 100];
   const colors = ["#ff00ff", "#00ffff", "#ffaa00"];

   function drawChart() {
     cctx.clearRect(0, 0, chart.width, chart.height);

     data.forEach((val, i) => {
       const x = 40 + i * 80;
       const y = 160 - val;

       cctx.fillStyle = colors[i];
       cctx.shadowBlur = 25;
       cctx.shadowColor = colors[i];

       cctx.fillRect(x, y, 40, val);
     });
   }

   drawChart();
</script> 


</body>
</html>
